name: Mise à jour données carburant + déploiement FTP

on:
  workflow_dispatch:          # déclenchement manuel possible
  schedule:
    - cron: "35 5 * * *"     # tous les jours à 5h35 UTC (7h35 heure française)
  push:
    branches: [main]          # full deploy automatique à chaque merge sur main

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Python
        run: pip install requests

      - name: Générer les données carburant
        run: |
          python scripts/build_data.py \
            --source instant \
            --output data \
            --history-start-year 2025

      - name: Préparer le paquet de déploiement
        run: |
          rm -rf dist && mkdir -p dist
          cp index.html robots.txt site.webmanifest sitemap.xml dist/
          cp -R assets dist/
          cp -R data dist/

      - name: Déployer sur le FTP
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          python - <<'EOF'
          import ftplib, os
          from pathlib import Path

          host = os.environ["FTP_HOST"]
          user = os.environ["FTP_USER"]
          passwd = os.environ["FTP_PASS"]
          remote_root = os.environ["FTP_DIR"].rstrip("/")
          local_root = Path("dist")

          MAX_SIZE = 15 * 1024 * 1024

          def ftp_mkdirs(ftp, remote_path):
              parts = remote_path.strip("/").split("/")
              current = ""
              for part in parts:
                  current += "/" + part
                  try:
                      ftp.mkd(current)
                  except ftplib.error_perm:
                      pass

          def upload_dir(ftp, local_dir, remote_dir):
              ftp_mkdirs(ftp, remote_dir)
              for item in sorted(local_dir.iterdir()):
                  remote_path = f"{remote_dir}/{item.name}"
                  if item.is_dir():
                      upload_dir(ftp, item, remote_path)
                  elif item.is_file():
                      size = item.stat().st_size
                      if size > MAX_SIZE:
                          print(f"  SKIP {remote_path} ({size//1024//1024}MB)")
                          continue
                      with open(item, "rb") as f:
                          ftp.storbinary(f"STOR {remote_path}", f)
                      print(f"  OK   {remote_path} ({size//1024}KB)")

          print(f"Connexion à {host}...")
          ftp = ftplib.FTP()
          ftp.connect(host, 21, timeout=60)
          ftp.login(user, passwd)
          ftp.set_pasv(True)
          print("Connecté.")
          upload_dir(ftp, local_root, remote_root)
          ftp.quit()
          print("Déploiement terminé.")
          EOF
