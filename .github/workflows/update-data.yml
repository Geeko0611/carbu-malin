name: Déploiement code sur le FTP

# Les DONNÉES (data/) ne sont plus gérées ici : elles sont régénérées chaque
# jour par un cron sur le serveur Hostinger (scripts/run_build.sh, 4h00).
# Ce workflow déploie UNIQUEMENT le code et ne touche jamais à /data,
# afin de ne pas écraser les données fraîches produites par le cron.

on:
  workflow_dispatch:          # déclenchement manuel possible
  push:
    branches: [main]          # déploiement du code à chaque merge sur main

jobs:
  deploy-code:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Préparer le paquet de déploiement (code uniquement, sans data/)
        run: |
          rm -rf dist && mkdir -p dist
          cp index.html robots.txt site.webmanifest sitemap.xml dist/
          cp -R assets dist/

      - name: Déployer sur le FTP (avec retries)
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          python3 - <<'EOF'
          import ftplib, os, time
          from pathlib import Path

          host = os.environ["FTP_HOST"]
          user = os.environ["FTP_USER"]
          passwd = os.environ["FTP_PASS"]
          remote_root = os.environ["FTP_DIR"].rstrip("/")
          local_root = Path("dist")

          def connect():
              ftp = ftplib.FTP()
              ftp.connect(host, 21, timeout=60)
              ftp.login(user, passwd)
              ftp.set_pasv(True)
              return ftp

          def ftp_mkdirs(ftp, remote_path):
              parts = remote_path.strip("/").split("/")
              current = ""
              for part in parts:
                  current += "/" + part
                  try:
                      ftp.mkd(current)
                  except ftplib.error_perm:
                      pass

          ftp = connect()
          print("Connecté.")

          def upload_file(item, remote_path, attempts=3):
              global ftp
              for attempt in range(1, attempts + 1):
                  try:
                      with open(item, "rb") as f:
                          ftp.storbinary(f"STOR {remote_path}", f)
                      print(f"  OK   {remote_path} ({item.stat().st_size//1024}KB)")
                      return
                  except ftplib.all_errors as exc:
                      print(f"  RETRY {remote_path} ({attempt}/{attempts}): {exc}")
                      time.sleep(3)
                      try:
                          ftp = connect()   # reconnexion après échec réseau
                      except ftplib.all_errors:
                          pass
              raise RuntimeError(f"Échec upload {remote_path}")

          def upload_dir(local_dir, remote_dir):
              ftp_mkdirs(ftp, remote_dir)
              for item in sorted(local_dir.iterdir()):
                  remote_path = f"{remote_dir}/{item.name}"
                  if item.is_dir():
                      upload_dir(item, remote_path)
                  elif item.is_file():
                      upload_file(item, remote_path)

          print(f"Connexion à {host}...")
          upload_dir(local_root, remote_root)
          ftp.quit()
          print("Déploiement code terminé.")
          EOF
