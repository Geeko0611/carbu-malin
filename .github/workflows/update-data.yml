name: Mise à jour données carburant + déploiement FTP

on:
  workflow_dispatch:          # déclenchement manuel possible
  schedule:
    - cron: "35 5 * * *"     # tous les jours à 5h35 UTC (7h35 heure française)

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Python
        run: pip install requests

      - name: Générer les données carburant
        run: |
          python scripts/build_data.py \
            --source instant \
            --output data \
            --history-start-year 2025

      - name: Préparer le paquet de déploiement
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html robots.txt sitemap.xml site.webmanifest dist/
          cp -R assets data dist/

      - name: Installer lftp
        run: sudo apt-get install -y lftp

      - name: Déployer sur le FTP via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '$FTP_USER','$FTP_PASS' ftp://$FTP_SERVER;
            mirror --reverse --delete --verbose --exclude='.git' ./dist/ $FTP_DIR;
            quit
          "
